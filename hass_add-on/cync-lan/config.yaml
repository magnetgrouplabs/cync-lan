name: "CyncLAN Controller"
version: "0.2.0a1"
slug: "cync-lan"
description: "Local async HTTP/MQTT controller for Cync / C by GE smart devices with device export"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
ports:
  23779/tcp: 23779
  23778/tcp: null
ports_description:
  23779/tcp: "TCP port for Cync device communication"
  23778/tcp: "Web interface for device export (ingress)"
ingress: true
ingress_port: 23778
ingress_entry: /
panel_icon: mdi:lightbulb
panel_title: "CyncLAN"
options:
  CYNC_ACCOUNT_USERNAME: ""
  CYNC_ACCOUNT_PASSWORD: ""
  CYNC_MQTT_HOST: "homeassistant.local"
  CYNC_MQTT_PORT: 1883
  CYNC_MQTT_USER: ""
  CYNC_MQTT_PASS: ""
  CYNC_TOPIC: "cync_lan"
  CYNC_HASS_TOPIC: "homeassistant"
  CYNC_DEBUG: false
schema:
  CYNC_MQTT_HOST: str
  CYNC_MQTT_PORT: int
  CYNC_MQTT_USER: str?
  CYNC_MQTT_PASS: password?
  CYNC_TOPIC: str
  CYNC_HASS_TOPIC: str
  CYNC_DEBUG: bool
map:
  - config:rw
url: "https://github.com/baudneo/cync-lan/tree/hass_addon"
homeassistant_api: false
host_network: true